<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h3>Welcome</h3>
      <p>Sign in to continue booking your stay</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group mb-3">
        <label>Username</label>

        <input
          type="text"
          class="form-control"
          formControlName="username"
          placeholder="Enter username"
        />

        @if (loginForm.get('username')?.touched && loginForm.get('username')?.invalid) {
          <div class="text-danger mt-1">Username is required</div>
        }
      </div>

      <div class="form-group mb-4">
        <label>Password</label>

        <input
          type="password"
          class="form-control"
          formControlName="password"
          placeholder="Enter password"
        />

        @if (loginForm.get('password')?.touched && loginForm.get('password')?.invalid) {
          <div class="text-danger mt-1">Password is required</div>
        }
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        Login
      </button>
    </form>

    <div class="auth-footer">
      <span>Don't have an account?</span>
      <a routerLink="/auth/register">Register</a>
    </div>
  </div>
</div>
